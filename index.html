<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="theme-color" content="#1e1e1e">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <title>Grocify - Smart Grocery</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        
        <div id="dashboard-view" class="view-section active-tab-view">
            <header class="dashboard-header">
                <div class="header-top">
                    <h1><i class="fa-solid fa-basket-shopping"></i> Grocify</h1>
                    <p>Buku Catatan Belanja Anda</p>
                </div>
                <div class="new-list-area">
                    <input type="text" id="new-list-input" placeholder="Nama daftar baru (Cth: Belanja Bulanan)..." autocomplete="off">
                    <button id="create-list-btn"><i class="fa-solid fa-plus"></i> Buat</button>
                </div>
            </header>
            
            <main id="lists-container" class="dashboard-main">
                </main>
        </div>

        <div id="memo-view" class="view-section" style="display: none;">
            <header class="dashboard-header">
                <div class="header-top">
                    <h1><i class="fa-solid fa-note-sticky"></i> Memo Belanja</h1>
                    <p>Catatan cepat, otomatis tersimpan langsung</p>
                </div>
            </header>
            <main class="memo-main">
                <textarea id="memo-textarea" placeholder="Tulis catatan random di sini... (Cth: Titipan tetangga, resep masakan, nomor telepon kurir, dll)"></textarea>
            </main>
        </div>

        <div id="theme-view" class="view-section" style="display: none;">
            <header class="dashboard-header">
                <div class="header-top">
                    <h1><i class="fa-solid fa-palette"></i> Tema Aplikasi</h1>
                    <p>Pilih nuansa warna yang Anda sukai</p>
                </div>
            </header>
            <main class="theme-main">
                <div class="theme-grid">
                    <button class="theme-tile active" data-theme="default">
                        <span class="theme-dot" style="background-color: #00e676;"></span> Default
                    </button>
                    <button class="theme-tile" data-theme="ocean">
                        <span class="theme-dot" style="background-color: #00b0ff;"></span> Ocean
                    </button>
                    <button class="theme-tile" data-theme="sapphire">
                        <span class="theme-dot" style="background-color: #2979ff;"></span> Sapphire
                    </button>
                    <button class="theme-tile" data-theme="lavender">
                        <span class="theme-dot" style="background-color: #b400ff;"></span> Lavender
                    </button>
                    <button class="theme-tile" data-theme="permen">
                        <span class="theme-dot" style="background-color: #ff4081;"></span> Permen
                    </button>
                    <button class="theme-tile" data-theme="sunset">
                        <span class="theme-dot" style="background-color: #ff6d00;"></span> Sunset
                    </button>
                    <button class="theme-tile" data-theme="rosegold">
                        <span class="theme-dot" style="background-color: #e5a9a9;"></span> Rose Gold
                    </button>
                </div>
            </main>
        </div>

        <div id="detail-view" class="view-section" style="display: none; z-index: 20;">
            <header class="detail-header-compact">
                <div class="header-top detail-top">
                    <button id="back-btn" class="back-btn"><i class="fa-solid fa-chevron-left"></i> Kembali</button>
                    <h1 id="current-list-title">Nama Daftar</h1>
                    <button id="menu-trigger-btn" class="menu-trigger-btn" aria-label="Menu Opsi">
                        <i class="fa-solid fa-ellipsis-vertical"></i>
                    </button>
                </div>
                
                <div id="search-bar-container" class="search-bar-container" style="display: none;">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <input type="text" id="search-items-input" placeholder="Cari nama barang di daftar ini..." autocomplete="off">
                    <button id="close-search-btn" class="close-search-btn"><i class="fa-solid fa-xmark"></i></button>
                </div>
                
                <div class="total-summary-compact">
                    <div class="summary-card-compact">
                        <span class="summary-label">Total Anggaran</span>
                        <span id="total-price" class="summary-value">Rp 0</span>
                    </div>
                    <div class="summary-card-compact accent">
                        <span class="summary-label">Sudah Dibeli</span>
                        <span id="completed-price" class="summary-value">Rp 0</span>
                    </div>
                </div>
            </header>

            <main id="main-scroll" class="detail-main-compact">
                <ul id="shopping-list">
                    </ul>
            </main>

            <div class="input-area">
                <div class="input-wrapper">
                    <select id="category-select">
                        <option value="Umum">📦 Umum</option>
                        <option value="Sayuran & Buah">🥬 Sayuran & Buah</option>
                        <option value="Daging & Ikan">🥩 Daging & Ikan</option>
                        <option value="Bumbu Dapur">🧂 Bumbu Dapur</option>
                        <option value="Minuman">🥤 Minuman</option>
                        <option value="Kebersihan">🧼 Kebersihan</option>
                    </select>
                    
                    <div id="suggestions-container" class="suggestions-container"></div>
                    
                    <div class="input-row">
                        <input type="text" id="item-input" placeholder="Nama barang..." autocomplete="off">
                        <input type="number" id="price-input" placeholder="Harga (Rp)..." autocomplete="off" inputmode="numeric">
                    </div>
                </div>
                <div class="action-buttons-col">
                    <button id="mic-btn" class="mic-btn" aria-label="Input Suara">
                        <i class="fa-solid fa-microphone"></i>
                    </button>
                    <button id="add-btn"><i class="fa-solid fa-plus"></i></button>
                </div>
            </div>
        </div>

        <nav id="main-navbar" class="main-navbar">
            <button class="nav-item active" data-tab="dashboard">
                <i class="fa-solid fa-basket-shopping"></i>
                <span>Daftar</span>
            </button>
            <button class="nav-item" data-tab="memo">
                <i class="fa-solid fa-note-sticky"></i>
                <span>Memo</span>
            </button>
            <button class="nav-item" data-tab="theme">
                <i class="fa-solid fa-palette"></i>
                <span>Tampilan</span>
            </button>
        </nav>

        <div id="sheet-overlay" class="sheet-overlay"></div>
        <div id="bottom-sheet" class="bottom-sheet">
            <div class="sheet-header" id="sheet-header">
                <div class="sheet-drag-handle"></div>
            </div>
            <div class="sheet-body">
                <button class="sheet-item" id="opt-search">
                    <i class="fa-solid fa-magnifying-glass"></i> Cari di dalam daftar
                </button>
                <button class="sheet-item" id="opt-rename">
                    <i class="fa-solid fa-pen-to-square"></i> Ganti nama daftar
                </button>
                <button class="sheet-item" id="opt-share">
                    <i class="fa-brands fa-whatsapp"></i> Bagikan daftar via WA
                </button>
                <button class="sheet-item" id="opt-edit-checked-price">
                    <i class="fa-solid fa-tags"></i> Edit harga item dicentang
                </button>
                <button class="sheet-item" id="opt-uncheck-all">
                    <i class="fa-regular fa-square"></i> Batalkan centang semua item
                </button>
                <button class="sheet-item" id="opt-check-all">
                    <i class="fa-regular fa-square-check"></i> Centang semua item
                </button>
                <hr class="sheet-divider">
                <button class="sheet-item danger" id="opt-delete-all">
                    <i class="fa-solid fa-trash-can"></i> Hapus semua item
                </button>
            </div>
        </div>

    </div>
    
    <script src="script.js"></script>
</body>
</html>
