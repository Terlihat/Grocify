<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grocify - Smart Grocery</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1><i class="fa-solid fa-basket-shopping"></i> Grocify</h1>
            <p>Daftar Belanja Cerdas & Cepat</p>
        </header>

        <div class="action-bar">
            <button id="clear-completed-btn" class="action-btn">
                <i class="fa-solid fa-broom"></i> Bersihkan
            </button>
            <button id="share-btn" class="action-btn">
                <i class="fa-brands fa-whatsapp"></i> Bagikan
            </button>
        </div>

        <main>
            <ul id="shopping-list">
                </ul>
        </main>

        <div class="input-area">
            <input type="text" id="item-input" placeholder="Tambah barang..." autocomplete="off">
            <button id="add-btn"><i class="fa-solid fa-plus"></i></button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
